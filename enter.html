<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter</title>
<style>
  :root{
    --bg:#04060a;
    --text:#e6ecf2;
    --muted:#6f7b8a;
  }

  body {
    margin:0;
    background:#04060a;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    text-align:center;
  }

  .brand {
    position:absolute;
    top:28px;
    left:40px;
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .container {
    max-width:560px;
    padding:20px;
  }

  h1 {
    font-size:28px;
    font-weight:500;
    letter-spacing:-0.02em;
    margin-bottom:40px;
  }

  p {
    font-size:18px;
    line-height:2;
    color:#d6dde6;
    margin:18px 0;
  }

  .footer {
    position:absolute;
    bottom:48px;
    width:100%;
    text-align:center;
    font-size:11px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .fade {
    opacity:0;
    transform:translateY(6px);
    animation:fadeIn 1.4s ease forwards;
  }

  .fade:nth-child(2){animation-delay:0.3s;}
  .fade:nth-child(3){animation-delay:0.6s;}
  .fade:nth-child(4){animation-delay:0.9s;}

  @keyframes fadeIn {
    to {
      opacity:1;
      transform:translateY(0);
    }
  }

</style>
</head>
<body>

<div class="brand">Prognostyx</div>

<div class="container">
  <h1 class="fade">The intelligence layer of medicine.</h1>

  <p class="fade">Continuous signals.</p>
  <p class="fade">Real-time understanding.</p>
  <p class="fade">Action before consequence.</p>
</div>

<div class="footer">MEDCONX</div>
<a href="mailto:elmer@prognostyx.ai"
   style="
     position:absolute;
     right:32px;
     bottom:7px;
     color:#6f7b8a;
     text-decoration:none;
     font-size:10px;
     letter-spacing:0.25em;
     text-transform:uppercase;
     opacity:0.6;
   ">
  Request Access
</a>
</body>
</html>
