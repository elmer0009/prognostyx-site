<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prognostyx</title>
<style>
  :root{
    --bg:#04060a;
    --text:#d6dde6;
    --muted:#6f7b8a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.025), transparent 28%),
      radial-gradient(circle at 75% 65%, rgba(255,255,255,0.018), transparent 30%),
      var(--bg);
    color: #e6ecf2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    inset: -20%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.018) 50%, transparent 100%);
    transform: translateX(-30%);
    animation: drift 18s ease-in-out infinite;
    pointer-events: none;
  }

  .container {
    max-width: 520px;
    padding: 20px;
    position: relative;
    z-index: 2;
    animation: breathe 7s ease-in-out infinite;
  }

  .brand {
    position: absolute;
    top: 28px;
    left: 40px;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 2;
    animation: glow 8s ease-in-out infinite;
  }

  p {
    font-size: 20px;
    line-height: 2;
    color: var(--text);
    margin: 0;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeIn 1.8s ease-out forwards;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    width: 100%;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    z-index: 2;
    animation: glow 10s ease-in-out infinite;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes breathe {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-2px); }
  }

  @keyframes glow {
    0%, 100% { opacity: 0.78; }
    50% { opacity: 1; }
  }

  @keyframes drift {
    0%, 100% { transform: translateX(-18%) translateY(0); opacity: 0.16; }
    50% { transform: translateX(18%) translateY(-1%); opacity: 0.28; }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, .container, .brand, p, .footer {
      animation: none !important;
      opacity: 1;
      transform: none;
    }
  }
</style>
</head>
<body onclick="window.location.href='enter.html'" style="cursor:pointer;">
  <div class="brand">Prognostyx</div>

  <div class="container">
    <p>
      A new layer is forming.<br><br>
      Not records. Not workflows.<br><br>
      Something beneath.
    </p>
  </div>

  <div class="footer">MEDCONX</div>
</body>
</html>
